name: Build on Push

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'windows-latest'
            args: ''
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ClipZen ${{ github.ref_name }}'
          releaseBody: 'See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Create Windows portable package
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $version = "${{ github.ref_type == 'tag' && github.ref_name || github.sha }}"
          $portableDir = "ClipZen-Portable-$version"
          New-Item -ItemType Directory -Force -Path $portableDir | Out-Null

          Copy-Item src-tauri/target/release/clipzen.exe "$portableDir/ClipZen.exe" -Force

          if (Test-Path src-tauri/target/release/WebView2Loader.dll) {
            Copy-Item src-tauri/target/release/WebView2Loader.dll "$portableDir/" -Force
          }

          Get-ChildItem src-tauri/target/release/*.dll -ErrorAction SilentlyContinue | ForEach-Object {
            Copy-Item $_.FullName "$portableDir/" -Force
          }

          if (Test-Path src-tauri/icons/icon.ico) {
            Copy-Item src-tauri/icons/icon.ico "$portableDir/" -Force
          }

          @"
          # ClipZen Portable (免安装版)

          直接运行 ClipZen.exe 即可使用，无需安装。

          版本: $version
          日期: $(Get-Date -Format "yyyy-MM-dd")
          "@ | Out-File -FilePath "$portableDir/README.txt" -Encoding UTF8

          & "C:\Program Files\7-Zip\7z.exe" a -t7z -mx=9 "ClipZen-Portable-$version.7z" ".\$portableDir\*"

      - name: Upload Windows portable artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: ClipZen-Portable-*.7z

      - name: Upload Windows build artifact
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-${{ github.sha }}
          path: |
            src-tauri/target/release/clipzen.exe
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi

      - name: Upload macOS build artifact
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.sha }}
          path: src-tauri/target/release/bundle/dmg/*.dmg

      - name: Upload Linux build artifact
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: linux-build-${{ github.sha }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
